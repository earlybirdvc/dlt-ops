# Release pipeline — manual dispatch. python-semantic-release computes the next
# version from conventional-commit history (squash-merge PR titles), stamps
# dlt_ops/__init__.py, commits, tags, and creates the GitHub release with
# the wheel+sdist attached; the wheel is then smoke-installed in a clean
# container before PyPI publish via trusted publishing (OIDC, no tokens).
#
#
# The release job runs as a GitHub App (SEMANTIC_RELEASE_APP_ID /
# SEMANTIC_RELEASE_PRIVATE_KEY) rather than GITHUB_TOKEN because its commit and
# tag have to land on main past the branch ruleset, which only a bypass actor
# can do — the default token is not one and cannot be made one.
name: Semantic Release

on:
  workflow_dispatch:
    inputs:
      force_level:
        description: Bump level override (none = derive from commits)
        type: choice
        default: none
        options: [none, patch, minor, major]
      prerelease:
        description: Cut the next version as a prerelease
        type: boolean
        default: false

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Releases only cut from a green main: the latest CI run must have succeeded.
  # An in-progress run gets up to 30 minutes to finish before this gives up.
  verify-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Latest CI run on main must be green
        run: |
          deadline=$((SECONDS + 1800))
          while true; do
            run_json=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?branch=main&per_page=1" --jq '.workflow_runs[0] // empty')
            if [ -z "$run_json" ]; then
              echo "::error::No CI runs found for main — push a commit through CI before releasing."
              exit 1
            fi
            status=$(jq -r '.status' <<<"$run_json")
            conclusion=$(jq -r '.conclusion' <<<"$run_json")
            url=$(jq -r '.html_url' <<<"$run_json")
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "Latest CI run on main is green: $url"
                exit 0
              fi
              echo "::error::Latest CI run on main concluded '$conclusion' — fix main before releasing: $url"
              exit 1
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::Gave up after 30 minutes waiting for the in-progress CI run: $url"
              exit 1
            fi
            echo "CI run is $status — waiting 30s: $url"
            sleep 30
          done

  # Version + changelog + commit + tag + GitHub release. The wheel and sdist
  # are built by [tool.semantic_release].build_command inside the PSR action
  # container and land in dist/ on the workspace mount.
  release:
    needs: verify-ci
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.psr.outputs.released }}
      version: ${{ steps.psr.outputs.version }}
      tag: ${{ steps.psr.outputs.tag }}
    steps:
      - name: Mint a GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.SEMANTIC_RELEASE_APP_ID }}
          private-key: ${{ secrets.SEMANTIC_RELEASE_PRIVATE_KEY }}
          # Scope the installation token: pushing the release commit + tag and
          # creating the GitHub release all live under contents.
          permission-contents: write

      # Full history: PSR diffs commits since the last tag to pick the bump.
      # Credentials stay on disk deliberately — PSR pushes the release commit
      # and tag back to main with them.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 zizmor: ignore[artipacked]
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Semantic release
        id: psr
        uses: python-semantic-release/python-semantic-release@39dd2052f2ce8282a5d932c31d58a2ca06d2550e # v10.6.1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          # 'none' must reach the action as an empty string: its force input
          # only accepts prerelease/patch/minor/major or unset.
          force: ${{ inputs.force_level != 'none' && inputs.force_level || '' }}
          prerelease: ${{ inputs.prerelease }}

      - name: Upload dists to the GitHub release
        if: steps.psr.outputs.released == 'true'
        uses: python-semantic-release/publish-action@5a5718ce47b892ef699f2972dae122297771d641 # v10.6.1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          tag: ${{ steps.psr.outputs.tag }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: steps.psr.outputs.released == 'true'
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # Clean-container proof that the built artifact works: install the wheel
  # (core + [duckdb]) with no repo sources on the path, import, drive the
  # console script, then run the E2E suite against the installed package.
  # tests/ + examples/ are copied out of the checkout so pytest cannot pick
  # up the repo's dlt_ops/ sources.
  smoke:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    container: python:3.12-slim
    permissions:
      contents: read
    env:
      RELEASE_VERSION: ${{ needs.release.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.tag }}
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Install the released wheel
        run: |
          wheels=(dist/*.whl)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one wheel in dist/, found: ${wheels[*]}"
            exit 1
          fi
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install "${wheels[0]}[duckdb]" pytest
      - name: Import + console script
        run: |
          installed=$(/tmp/smoke-venv/bin/python -c "import dlt_ops; print(dlt_ops.__version__)")
          echo "installed dlt-ops ${installed}"
          test "${installed}" = "${RELEASE_VERSION}"
          /tmp/smoke-venv/bin/dlt-ops --help
      - name: Run the E2E suite against the installed package
        # step2 is deselected: it drives the console script through
        # `uv run --project <repo checkout>`, which would exercise the
        # repo sources, not the built wheel. The console script is
        # proven directly in the step above instead.
        run: |
          mkdir /tmp/smoke
          cp -R tests examples /tmp/smoke/
          cd /tmp/smoke
          /tmp/smoke-venv/bin/python -m pytest tests/test_e2e_example.py -q \
            --deselect tests/test_e2e_example.py::TestExampleProjectEndToEnd::test_step2_validate_exits_zero_via_console_script

  publish-pypi:
    needs: smoke
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dlt-ops
    permissions:
      id-token: write # OIDC for trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  summary:
    needs: [release, publish-pypi]
    if: always()
    runs-on: ubuntu-latest
    env:
      RELEASED: ${{ needs.release.outputs.released }}
      VERSION: ${{ needs.release.outputs.version }}
      TAG: ${{ needs.release.outputs.tag }}
      PYPI_RESULT: ${{ needs.publish-pypi.result }}
      REPO_URL: ${{ github.server_url }}/${{ github.repository }}
    steps:
      - name: Write release summary
        run: |
          {
            echo "## Release"
            if [ "$RELEASED" != "true" ]; then
              echo "No release was made — no version-bumping commits since the last tag."
            else
              echo "- Version: **${VERSION}**"
              echo "- GitHub release: ${REPO_URL}/releases/tag/${TAG}"
              echo "- PyPI: https://pypi.org/project/dlt-ops/${VERSION}/ (publish job: ${PYPI_RESULT})"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
